<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>O Segredo de Picasso — Jogo Bilíngue</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Times New Roman', Times, serif;
    background: #fdf6e3;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    padding: 24px 16px 40px;
  }

  .game-wrap {
    background: #fff;
    border-radius: 24px;
    max-width: 680px;
    width: 100%;
    padding: 0 0 36px;
    box-shadow: 0 8px 40px rgba(0,0,0,0.10);
    border: 3px solid #f7c948;
    overflow: hidden;
  }

  .rainbow-bar {
    height: 10px;
    background: repeating-linear-gradient(90deg,
      #e94f4f 0 40px, #f7c948 40px 80px,
      #4db6ac 80px 120px, #7e57c2 120px 160px, #66bb6a 160px 200px);
  }

  .inner { padding: 24px 28px 0; }

  .game-title {
    text-align: center;
    font-size: 1.7rem;
    font-weight: bold;
    color: #7e57c2;
    text-transform: uppercase;
    letter-spacing: 2px;
    margin-bottom: 4px;
  }

  .game-subtitle {
    text-align: center;
    font-size: 0.85rem;
    color: #aaa;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 16px;
  }

  .progress-bar {
    width: 100%;
    height: 6px;
    background: #f0f0e8;
    border-radius: 3px;
    margin-bottom: 16px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: #66bb6a;
    border-radius: 3px;
    transition: width 0.4s ease;
  }

  .top-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 16px;
    flex-wrap: wrap;
    gap: 8px;
  }

  .score-box {
    background: #f8f5ee;
    border: 1px solid #e8e0cc;
    border-radius: 10px;
    padding: 6px 18px;
    font-size: 13px;
    color: #888;
    font-weight: bold;
    text-transform: uppercase;
  }
  .score-box span { font-size: 20px; color: #333; }


  .question-card {
    background: #fdf6e3;
    border: 2px solid #f7c948;
    border-radius: 16px;
    padding: 24px 20px 20px;
    margin-bottom: 16px;
    text-align: center;
    min-height: 170px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
    position: relative;
  }

  .big-emoji { font-size: 64px; line-height: 1; }

  .question-text {
    font-size: 1.1rem;
    font-weight: bold;
    color: #333;
    text-transform: uppercase;
    line-height: 1.5;
  }

  .question-sub {
    font-size: 0.88rem;
    color: #999;
    font-style: italic;
    text-transform: uppercase;
  }

  /* SPEAK BUTTON */
  .speak-btn {
    background: #fff;
    border: 2px solid #4db6ac;
    border-radius: 50px;
    padding: 6px 18px;
    font-family: 'Times New Roman', Times, serif;
    font-size: 13px;
    font-weight: bold;
    color: #006d63;
    cursor: pointer;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    transition: background 0.15s, transform 0.1s;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .speak-btn:hover { background: #e1f5f3; transform: scale(1.04); }
  .speak-btn.speaking {
    background: #4db6ac;
    color: #fff;
    border-color: #4db6ac;
  }
  .speak-icon { font-size: 16px; }

  .options-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 14px;
  }

  .opt-btn {
    background: #fff;
    border: 2px solid #ddd;
    border-radius: 14px;
    padding: 14px 10px;
    font-family: 'Times New Roman', Times, serif;
    font-size: 14px;
    font-weight: bold;
    color: #333;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 5px;
    transition: background 0.15s, border-color 0.15s, transform 0.1s;
    text-transform: uppercase;
  }

  .opt-btn:hover:not(:disabled) {
    background: #fdf6e3;
    border-color: #f7c948;
    transform: scale(1.03);
  }
  .opt-btn:disabled { cursor: default; }

  .opt-emoji { font-size: 28px; }
  .opt-pt { font-size: 13px; font-weight: bold; color: #333; }
  .opt-en { font-size: 11px; color: #999; font-style: italic; }

  .opt-btn.correct { background: #EAF3DE; border-color: #66bb6a; }
  .opt-btn.correct .opt-pt { color: #2e7d32; }
  .opt-btn.correct .opt-en { color: #4caf50; }
  .opt-btn.wrong   { background: #FCEBEB; border-color: #e94f4f; }
  .opt-btn.wrong .opt-pt { color: #c62828; }

  .feedback-box {
    border-radius: 10px;
    padding: 11px 16px;
    font-size: 14px;
    font-weight: bold;
    text-align: center;
    margin-bottom: 12px;
    min-height: 42px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    border: 1.5px solid transparent;
  }
  .feedback-box.empty   { background: #f8f5ee; color: #aaa; border-color: #e8e0cc; }
  .feedback-box.correct { background: #EAF3DE; color: #2e7d32; border-color: #66bb6a; }
  .feedback-box.wrong   { background: #FCEBEB; color: #c62828; border-color: #e94f4f; }

  .next-btn {
    width: 100%;
    padding: 13px;
    border: 2px solid #ddd;
    border-radius: 10px;
    background: #fff;
    font-family: 'Times New Roman', Times, serif;
    font-size: 15px;
    font-weight: bold;
    color: #555;
    cursor: pointer;
    text-transform: uppercase;
    letter-spacing: 1px;
    transition: background 0.15s, border-color 0.15s;
  }
  .next-btn:hover:not(:disabled) { background: #fdf6e3; border-color: #f7c948; color: #333; }
  .next-btn:disabled { opacity: 0.3; cursor: default; }

  /* END SCREEN */
  .end-screen {
    text-align: center;
    padding: 2.5rem 1.5rem;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
  }
  .end-emoji { font-size: 72px; }
  .end-title { font-size: 1.5rem; font-weight: bold; color: #7e57c2; text-transform: uppercase; letter-spacing: 2px; }
  .end-score { font-size: 1rem; color: #888; text-transform: uppercase; font-weight: bold; }
  .stars { font-size: 32px; letter-spacing: 4px; margin: 4px 0; }

  .restart-btn {
    margin-top: 8px;
    padding: 12px 36px;
    border: 2px solid #ddd;
    border-radius: 10px;
    background: #fff;
    font-family: 'Times New Roman', Times, serif;
    font-size: 15px;
    font-weight: bold;
    text-transform: uppercase;
    letter-spacing: 1px;
    cursor: pointer;
    color: #555;
    transition: background 0.15s, border-color 0.15s;
  }
  .restart-btn:hover { background: #fdf6e3; border-color: #f7c948; color: #333; }

  .footer-note {
    text-align: center;
    font-size: 0.75rem;
    color: #ccc;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-top: 24px;
    padding: 0 20px;
  }
</style>
</head>
<body>

<div class="game-wrap">
  <div class="rainbow-bar"></div>
  <div class="inner">

    <div class="game-title">🎨 O Segredo de Picasso</div>
    <div class="game-subtitle">Jogo Bilíngue · Bilingual Game · 5 anos</div>

    <div class="progress-bar"><div class="progress-fill" id="prog"></div></div>

    <div class="top-bar">
      <div class="score-box">Pontos / Points: <span id="score">0</span></div>

    </div>

    <div id="game-area">
      <div class="question-card" id="q-card">
        <div class="big-emoji" id="q-emoji">🎨</div>
        <div class="question-text" id="q-text">Carregando...</div>
        <div class="question-sub" id="q-sub"></div>
        <button class="speak-btn" id="speak-btn" onclick="speakQuestion()">
          <span class="speak-icon">🔊</span> Listen in English
        </button>
      </div>

      <div class="options-grid" id="opts-grid"></div>

      <div class="feedback-box empty" id="feedback">Escolha uma resposta! / Choose an answer!</div>
      <button class="next-btn" id="next-btn" disabled onclick="nextQuestion()">Próxima → Next</button>
    </div>

    <div id="end-screen" class="end-screen" style="display:none;"></div>

    <div class="footer-note">✏️ Escola Lápis de Cor · Inspirado em Picasso</div>
  </div>
</div>

<script>
// ─── QUESTIONS ───────────────────────────────────────────────
var questions = [
  {
    phase: 1, emoji: "😊",
    pt: "Como Picasso se via no espelho?",
    en: "What did Picasso see when he looked in the mirror?",
    sub: "Qual é o rosto / Which face?",
    options: [
      { emoji:"😊", pt:"Rosto",   en:"Face",  correct:true  },
      { emoji:"🌳", pt:"Árvore",  en:"Tree",  correct:false },
      { emoji:"🐟", pt:"Peixe",   en:"Fish",  correct:false },
      { emoji:"🏠", pt:"Casa",    en:"House", correct:false }
    ]
  },
  {
    phase: 1, emoji: "🖌️",
    pt: "O que Picasso usou para pintar?",
    en: "What did Picasso use to paint?",
    sub: "Qual ferramenta / Which tool?",
    options: [
      { emoji:"✂️", pt:"Tesoura", en:"Scissors",   correct:false },
      { emoji:"🖌️", pt:"Pincel",  en:"Paintbrush", correct:true  },
      { emoji:"📏", pt:"Régua",   en:"Ruler",      correct:false },
      { emoji:"🔨", pt:"Martelo", en:"Hammer",     correct:false }
    ]
  },
  {
    phase: 1, emoji: "😄",
    pt: "Quando Picasso estava feliz, que cor ele usava?",
    en: "When Picasso was happy, what color did he use?",
    sub: "Qual cor / Which color?",
    options: [
      { emoji:"🔵", pt:"Azul",    en:"Blue",   correct:false },
      { emoji:"🟡", pt:"Amarelo", en:"Yellow", correct:true  },
      { emoji:"⚫", pt:"Preto",   en:"Black",  correct:false },
      { emoji:"🟤", pt:"Marrom",  en:"Brown",  correct:false }
    ]
  },
  {
    phase: 2, emoji: "😢",
    pt: "Quando Picasso ficava triste, que cor aparecia?",
    en: "When Picasso was sad, which color appeared?",
    sub: "Que cor é a tristeza / What color is sadness?",
    options: [
      { emoji:"🟠", pt:"Laranja",   en:"Orange", correct:false },
      { emoji:"🟢", pt:"Verde",     en:"Green",  correct:false },
      { emoji:"🔵", pt:"Azul",      en:"Blue",   correct:true  },
      { emoji:"🔴", pt:"Vermelho",  en:"Red",    correct:false }
    ]
  },
  {
    phase: 2, emoji: "🖼️",
    pt: "O que é um autorretrato?",
    en: "What is a self-portrait?",
    sub: "Escolha a resposta / Choose the answer",
    options: [
      { emoji:"🏔️", pt:"Pintura de montanha",     en:"Painting of a mountain", correct:false },
      { emoji:"😊", pt:"Pintura do próprio rosto", en:"Painting of yourself",   correct:true  },
      { emoji:"🌊", pt:"Pintura do mar",           en:"Painting of the sea",    correct:false },
      { emoji:"🌸", pt:"Pintura de flores",        en:"Painting of flowers",    correct:false }
    ]
  },
  {
    phase: 2, emoji: "❤️",
    pt: "O que toda pintura conta?",
    en: "What does every painting tell us?",
    sub: "O segredo / The secret",
    options: [
      { emoji:"🌦️", pt:"O tempo",              en:"The weather",    correct:false },
      { emoji:"❤️", pt:"A história do coração", en:"The heart's story", correct:true },
      { emoji:"📅", pt:"A data",               en:"The date",       correct:false },
      { emoji:"💰", pt:"O preço",              en:"The price",      correct:false }
    ]
  },
  {
    phase: 3, emoji: "🎭",
    pt: "Como se diz FELIZ em inglês?",
    en: "How do you say FELIZ in English?",
    sub: "Português → English",
    options: [
      { emoji:"😢", pt:"Sad",     en:"Triste",   correct:false },
      { emoji:"😄", pt:"Happy",   en:"Feliz",    correct:true  },
      { emoji:"😠", pt:"Angry",   en:"Bravo",    correct:false },
      { emoji:"😴", pt:"Sleepy",  en:"Com sono", correct:false }
    ]
  },
  {
    phase: 3, emoji: "🌈",
    pt: "Como se diz COR em inglês?",
    en: "How do you say COR in English?",
    sub: "Português → English",
    options: [
      { emoji:"🖼️", pt:"Painting", en:"Pintura", correct:false },
      { emoji:"🖌️", pt:"Brush",    en:"Pincel",  correct:false },
      { emoji:"🌈", pt:"Color",    en:"Cor",     correct:true  },
      { emoji:"😊", pt:"Face",     en:"Rosto",   correct:false }
    ]
  }
];

// ─── STATE ───────────────────────────────────────────────────
var current  = 0;
var score    = 0;
var answered = false;
var shuffled = [];
var audioUnlocked = false;
var enVoice  = null;

// ─── AUDIO ───────────────────────────────────────────────────
function loadVoice(cb) {
  if (!window.speechSynthesis) return;
  var attempts = 0;
  function tryLoad() {
    var voices = speechSynthesis.getVoices();
    // Priority: en-US child-friendly voices
    var preferred = ['Samantha','Karen','Victoria','Allison','Ava','Susan','Zoe'];
    var found = null;
    for (var p = 0; p < preferred.length; p++) {
      for (var v = 0; v < voices.length; v++) {
        if (voices[v].name.indexOf(preferred[p]) !== -1 && voices[v].lang.indexOf('en') !== -1) {
          found = voices[v]; break;
        }
      }
      if (found) break;
    }
    if (!found) {
      for (var v = 0; v < voices.length; v++) {
        if (voices[v].lang === 'en-US') { found = voices[v]; break; }
      }
    }
    if (!found) {
      for (var v = 0; v < voices.length; v++) {
        if (voices[v].lang.indexOf('en') !== -1) { found = voices[v]; break; }
      }
    }
    if (found) { enVoice = found; if (cb) cb(); }
    else if (attempts < 6) { attempts++; setTimeout(tryLoad, 300); }
  }
  if (speechSynthesis.onvoiceschanged !== undefined) {
    speechSynthesis.onvoiceschanged = tryLoad;
  }
  tryLoad();
}

function speakText(text, onEnd) {
  if (!audioUnlocked || !window.speechSynthesis) return;
  speechSynthesis.cancel();
  setTimeout(function() {
    var utt = new SpeechSynthesisUtterance(text);
    if (enVoice) utt.voice = enVoice;
    utt.lang  = 'en-US';
    utt.rate  = 0.78;   // slow = child-friendly
    utt.pitch = 1.35;   // higher = younger sound
    utt.volume = 1;
    if (onEnd) utt.onend = onEnd;
    speechSynthesis.speak(utt);
  }, 80);
}

function playTone(type) {
  if (!audioUnlocked || !window.AudioContext) return;
  try {
    var ctx = new (window.AudioContext || window.webkitAudioContext)();
    var osc = ctx.createOscillator();
    var gain = ctx.createGain();
    osc.connect(gain);
    gain.connect(ctx.destination);
    if (type === 'correct') {
      osc.frequency.setValueAtTime(523, ctx.currentTime);
      osc.frequency.setValueAtTime(659, ctx.currentTime + 0.12);
      osc.frequency.setValueAtTime(784, ctx.currentTime + 0.24);
      gain.gain.setValueAtTime(0.3, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.55);
      osc.start(); osc.stop(ctx.currentTime + 0.55);
    } else {
      osc.frequency.setValueAtTime(300, ctx.currentTime);
      osc.frequency.setValueAtTime(220, ctx.currentTime + 0.2);
      gain.gain.setValueAtTime(0.25, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.45);
      osc.start(); osc.stop(ctx.currentTime + 0.45);
    }
  } catch(e) {}
}

// speak the current question in English
function speakQuestion() {
  var q = shuffled[current];
  if (!q) return;
  var btn = document.getElementById('speak-btn');
  btn.classList.add('speaking');
  speakText(q.en, function() { btn.classList.remove('speaking'); });
}

// ─── GAME ────────────────────────────────────────────────────
function shuffleArr(arr) { return arr.slice().sort(function(){ return Math.random()-0.5; }); }

function init() {
  shuffled = shuffleArr(questions);
  current = 0; score = 0;
  render();
}

function render() {
  if (current >= shuffled.length) { showEnd(); return; }
  var q = shuffled[current];
  answered = false;

  document.getElementById('prog').style.width = ((current / shuffled.length) * 100) + '%';
  document.getElementById('score').textContent = score;
  document.getElementById('q-emoji').textContent = q.emoji;
  document.getElementById('q-text').textContent  = q.pt;
  document.getElementById('q-sub').textContent   = q.en;
  document.getElementById('speak-btn').classList.remove('speaking');

  var grid = document.getElementById('opts-grid');
  grid.innerHTML = '';
  var opts = shuffleArr(q.options);
  opts.forEach(function(opt) {
    var btn = document.createElement('button');
    btn.className = 'opt-btn';
    btn.innerHTML =
      '<span class="opt-emoji">' + opt.emoji + '</span>' +
      '<span class="opt-pt">'    + opt.pt    + '</span>' +
      '<span class="opt-en">'    + opt.en    + '</span>';
    btn.onclick = function() { choose(btn, opt); };
    grid.appendChild(btn);
  });

  var fb = document.getElementById('feedback');
  fb.textContent = 'Escolha uma resposta! / Choose an answer!';
  fb.className   = 'feedback-box empty';
  document.getElementById('next-btn').disabled = true;

  // auto-read question after short delay
  if (audioUnlocked) {
    setTimeout(function(){ speakText(shuffled[current].en, function(){}); }, 600);
  }
}

function choose(btn, opt) {
  if (answered) return;
  answered = true;
  var allBtns = document.querySelectorAll('.opt-btn');
  allBtns.forEach(function(b){ b.disabled = true; });

  var fb = document.getElementById('feedback');
  var q  = shuffled[current];

  if (opt.correct) {
    btn.classList.add('correct');
    score++;
    document.getElementById('score').textContent = score;
    fb.textContent = '⭐ Muito bem! / Well done!';
    fb.className   = 'feedback-box correct';
    playTone('correct');
    if (audioUnlocked) {
      setTimeout(function(){
        speakText('Great job! The answer is ' + opt.en + '!', function(){});
      }, 300);
    }
  } else {
    btn.classList.add('wrong');
    // highlight correct
    allBtns.forEach(function(b) {
      var pt = b.querySelector('.opt-pt').textContent;
      var match = q.options.find(function(o){ return o.pt === pt && o.correct; });
      if (match) b.classList.add('correct');
    });
    fb.textContent = '💙 Tente de novo! / Try again next time!';
    fb.className   = 'feedback-box wrong';
    playTone('wrong');
    // speak correct answer
    var correctOpt = q.options.find(function(o){ return o.correct; });
    if (audioUnlocked && correctOpt) {
      setTimeout(function(){
        speakText('The correct answer is ' + correctOpt.en + '!', function(){});
      }, 300);
    }
  }
  document.getElementById('next-btn').disabled = false;
}

function nextQuestion() {
  current++;
  render();
}

function showEnd() {
  document.getElementById('game-area').style.display = 'none';
  document.getElementById('prog').style.width = '100%';
  var pct = score / shuffled.length;
  var emoji, msg, stars, speechMsg;
  if (pct === 1)       { emoji='🌟'; msg='Perfeito! / Perfect!';              stars='⭐⭐⭐'; speechMsg='Perfect score! You are amazing!'; }
  else if (pct>=0.75)  { emoji='🎨'; msg='Muito bem! / Great job!';           stars='⭐⭐⭐'; speechMsg='Great job! You did really well!'; }
  else if (pct>=0.5)   { emoji='😊'; msg='Bom trabalho! / Good work!';        stars='⭐⭐';  speechMsg='Good work! Keep practicing!'; }
  else                 { emoji='🖌️'; msg='Continue praticando! / Keep going!'; stars='⭐';   speechMsg='Keep going! You can do it!'; }

  var end = document.getElementById('end-screen');
  end.innerHTML =
    '<div class="end-emoji">' + emoji + '</div>' +
    '<div class="end-title">' + msg + '</div>' +
    '<div class="stars">' + stars + '</div>' +
    '<div class="end-score">Você acertou ' + score + ' de ' + shuffled.length + ' / You got ' + score + ' out of ' + shuffled.length + '</div>' +
    '<button class="restart-btn" onclick="restart()">Jogar de novo / Play again ↺</button>';
  end.style.display = 'flex';

  if (audioUnlocked) setTimeout(function(){ speakText(speechMsg, function(){}); }, 500);
}

function restart() {
  document.getElementById('end-screen').style.display = 'none';
  document.getElementById('game-area').style.display  = 'block';
  init();
}

// Ativa áudio automaticamente ao carregar a página
window.addEventListener('load', function(){
  audioUnlocked = true;
  loadVoice(function() {
    speakText("Hello! Let's play!", function(){});
  });
});
init();
</script>
</body>
</html>
